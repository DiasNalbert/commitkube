services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    volumes:
      - db_data:/app/data
    command: sh -c "mkdir -p /app/data && ln -sf /app/data/kubecommit.db /app/kubecommit.db && ./kubecommit-api"
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
volumes:
  db_data:
